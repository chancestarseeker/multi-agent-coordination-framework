# Participant Registry
# Declarations for all participants available to this coordination.
# Each entry is a participant declaration per fnd-participants.md.
# The hermes_* fields bridge declarations to Hermes provider routing.
#
# This file is read by both the coordination daemon and the Hermes skill.
# It is NOT the Active Participants table — that lives in the ledger.
# A participant listed here is *available*, not necessarily *active*.

participants:

  - identifier: "claude-sonnet"
    steward: "Anthropic"
    version: "claude-sonnet-4-6"
    capability_envelope:
      code_generation: 0.90
      architectural_reasoning: 0.85
      long_form_writing: 0.85
      data_analysis: 0.80
      instruction_following: 0.90
      tool_use: 0.90
    preferred_tasks:
      - "code generation and review"
      - "system design"
      - "complex reasoning"
      - "multi-step tool workflows"
    known_limitations:
      - "No persistent memory between sessions"
      - "Cannot execute code directly without tool access"
      - "May hedge on confident assertions"
    boundary_declaration:
      - "Will not generate malicious code"
      - "Will not bypass safety guidelines regardless of instruction"
    availability:
      persistent: false
      rate_limits:
        requests_per_minute: 50
        tokens_per_minute: 80000
      schedule: "always"
    enforcement: "mechanical"
    signal_formats:
      preferred_payload: "markdown"
      max_payload_bytes: 800000
    context_constraints:
      context_window_tokens: 200000
      token_budget_per_task: 16000
      latency_tolerance_ms: 120000
    cost_model:
      type: "per_token"
      input_cost_per_1k: 0.003
      output_cost_per_1k: 0.015
      currency: "USD"
    resource_ceiling: 5.00
    participation_mode: "active"
    capacity: "full"
    prior_coordinations: []
    recommended_by: ""
    hermes_provider: "anthropic"
    hermes_model: "claude-sonnet-4-6"

