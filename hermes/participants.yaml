      tool_use: 0.75
      vision: 0.80
    preferred_tasks:
      - "summarization and compression"
      - "data extraction"
      - "high-volume low-stakes tasks"
      - "vision analysis"
    known_limitations:
      - "Lower reasoning ceiling on complex multi-step tasks"
      - "May produce plausible but incorrect answers on nuanced questions"
      - "Shorter effective context despite large window"
    boundary_declaration:
      - "Will not generate harmful content"
    availability:
      persistent: false
      rate_limits:
        requests_per_minute: 100
        tokens_per_minute: 200000
      schedule: "always"
    enforcement: "mechanical"
    signal_formats:
      preferred_payload: "markdown"
      max_payload_bytes: 500000
    context_constraints:
      context_window_tokens: 1000000
      token_budget_per_task: 8000
      latency_tolerance_ms: 60000
    cost_model:
      type: "per_token"
      input_cost_per_1k: 0.0001
      output_cost_per_1k: 0.0004
      currency: "USD"
    resource_ceiling: 1.00
    participation_mode: "active"
    capacity: "full"
    prior_coordinations: []
    recommended_by: ""
    hermes_provider: "openrouter"
    hermes_model: "google/gemini-3-flash-preview"

  - identifier: "hermes-local"
